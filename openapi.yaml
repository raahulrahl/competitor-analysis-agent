        version: '1.0.0'
        author: 'paras@getbindu.com'
        examples:
          - 'Analyze the competitive landscape for Stripe in the payments industry'
          - 'Research competitors to Shopify in the e-commerce platform market'
          - 'Perform SWOT analysis on Apple competitors in the smartphone market'
        capabilities_detail:
          primary_capability:
            supported: true
            description: 'Web-based competitive intelligence using Firecrawl search, crawl, and mapping'
            features:
              - 'Web search for competitor discovery (Firecrawl search with limit 2)'
              - 'Website scraping for product and pricing information (Firecrawl crawl, limit 5)'
